<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitix | Series y Perliculas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<body>
    <div class="barra">
        <nav class="logo">
            <p>PITIX</p>
        </nav>

        <nav class="otro">
            <p>| | |</p>
        </nav>
    </div>

    <div class="main">
        <div class="contador">
           <h1 id="reloj">24:00:00</h1>
        </div>

        <div class="info">
           <h1>Estreno!!!</h1>
           <p>3er Temporada de...</p>
           <p>La picsa GANG</p>
        </div>
    </div>

    <div class="informacion">
        <div class="main">
        
        </div>
    </div>
</body>
<script>
        let horas = 24;
        let minutos = 0;
        let segundos = 0;

        setInterval(() => {
            if (segundos > 0) {
                segundos = segundos - 1;
            } 
            
            else if (minutos > 0) {
                segundos = 59;
                minutos = minutos - 1;
            } 
            
            else if (horas > 0) {
                segundos = 59;
                minutos = 59;
                horas = horas - 1;
            }

            document.getElementById("reloj").innerText = horas + ":" + minutos + ":" + segundos;
        }, 1000);
</script>
</html>
